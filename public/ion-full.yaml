        - ION-2011
      atRuntime:
        description: Actions checked against declared policy terms
        errors:
        - ION-5001
        - ION-5002
        - ION-5003
        - ION-5004
        - ION-5008
        - ION-5009
      atReconcile:
        description: Penalty policies fire as deductions per linked IRI
        info: ION-6003
x-ion-conditional-rules:
  version: 1.0.0
  description: 'Cross-schema conditional requirements for ION. Each rule declares: when a trigger field (in the same composed
    Attributes bag at runtime) takes a given value, a field on the named schema becomes required. JSON Schema if/then/else
    cannot express these because the trigger field lives in a different schema that is composed at runtime. ONIX (the ION
    network validator) enforces these rules at every API boundary.

    '
  enforcedBy: ONIX
  rules:
  - schema: LogisticsParticipantAddendum
    field: driverLicenceCategory
    triggerSchema: IONParticipant
    triggerField: role
    triggerValue: DRIVER
    condition: Required when role=DRIVER
  - schema: LogisticsParticipantAddendum
    field: driverLicenceNumber
    triggerSchema: IONParticipant
    triggerField: role
    triggerValue: DRIVER
    condition: Required when role=DRIVER (roro, freight, hyperlocal)
  - schema: LogisticsParticipantAddendum
    field: ppjkLicenceNumber
    triggerSchema: IONParticipant
    triggerField: role
    triggerValue: CUSTOMS_BROKER
    condition: Required when role=CUSTOMS_BROKER
  - schema: TradeContract
    field: codAmount
    triggerSchema: PaymentDeclaration
    triggerField: paymentRail
    triggerValue: COD
    condition: Required when paymentRail=COD
  - schema: TradeContract
    field: fakturPajakReference
    triggerSchema: IONBusinessIdentity
    triggerField: pkpStatus
    triggerValue: PKP
    condition: Required for PKP sellers (identity.pkpStatus=PKP) when invoiceType=TAX_INVOICE
tags:
- name: Discovery
  description: Discover catalogs published by providers
- name: Contracting / Ordering
  description: Negotiate and agree on pricing, terms and establish dual-digitally signed contracts
- name: Fulfillment
  description: Track, update and cancel active contracts
- name: Post-Fulfillment
  description: Rate and support completed contracts
- name: Fabric API - Cataloging Service
  description: Publish catalogs to the Cataloging Service (CS) on the Fabric and subscribe to catalog updates. 
security: []
servers:
- url: https://{subscriberUrl}
  description: ION Network participant base URL. {subscriberUrl} is the registered FQDN of the BAP/BPP per the ION Registry
    on dedi.global.
  variables:
    subscriberUrl:
      default: example.ion.id
      description: Registered subscriber URL of the ION Network participant.
paths:
  /discover:
    post:
      summary: Discover catalogs on a network
      description: "The CN sends a discovery request to the DS (Discovery Service),\
        \ which searches its indexed catalog store for resources and offers matching\
        \ the supplied intent.\n\nFabric context: The DS maintains a synchronized catalog\
        \ index by subscribing to the CS (Cataloging Service) on the Fabric. The CN\
        \ does not interact directly with the Fabric for discovery.\n\nThe message\
        \ MUST contain an Intent object. The Intent carries textSearch, JSONPath filter\
        \ expressions per RFC 9535, spatial constraints, and media search inputs that\
        \ the DS evaluates against its indexed catalog store.\n\nCallback relationship:\
        \ When matching catalogs are found, the DS sends an /on_discover callback to\
        \ the CN carrying an OnDiscoverAction with the matching catalogs. The CN\
        \ MUST correlate the callback using the messageId from Context.\n\nResponse\
        \ codes: Ack, AckNoCallback, NackBadRequest, NackUnauthorized, ServerError."
      operationId: discover
      tags:
      - Discovery
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: discover
                message:
                  $ref: '#/components/schemas/DiscoverAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '403':
          $ref: '#/components/responses/NackDiscretionary'
        '202':
          $ref: '#/components/responses/AckNoCallback'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /on_discover:
    post:
      summary: Callback — return catalogs to the CN
      description: "The DS (Discovery Service) calls this endpoint on the CN, delivering\
        \ catalogs that match the intent submitted in a prior /discover request.\n\n\
        Additional preconditions: A /discover request MUST have been sent by the CN\
        \ and accepted (200 Ack) by the DS before this callback is triggered.\n\nThe\
        \ message MUST contain an OnDiscoverAction with one or more Catalog objects\
        \ matching the original intent.\n\nCallback relationship: Triggered by the\
        \ DS after evaluating the /discover request against its indexed catalog store.\
        \ The CN MUST use the messageId in Context to correlate this callback with\
        \ the originating /discover call.\n\nResponse codes: Ack, NackBadRequest,\
        \ NackUnauthorized, ServerError."
      operationId: onDiscover
      tags:
      - Discovery
      parameters:
      - $ref: '#/components/parameters/CallbackAuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: on_discover
                message:
                  $ref: '#/components/schemas/OnDiscoverAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /select:
    post:
      summary: CN selects items/resources and requests a quote
      description: "The CN sends a selection to the PN, identifying specific resources\
        \ and offers from a previously discovered catalog and requesting a priced quote.\n\
        \nAdditional preconditions: A /discover request MUST have completed and the\
        \ CN MUST have received at least one /on_discover callback containing the\
        \ catalog from which the selected items are drawn. No personal identifiable\
        \ information (PII) is shared at this stage.\n\nThe message MUST contain a\
        \ SelectAction with a Contract object specifying the selected commitments, resources,\
        \ and offers. The Contract MUST NOT include billing or fulfillment personal\
        \ details at this stage.\n\nCallback relationship: After computing the priced\
        \ quote, the PN MUST send an /on_select callback to the CN carrying the\
        \ updated Contract with offer-linked considerations. The CN MUST correlate\
        \ the callback using the messageId from Context.\n\nResponse codes: Ack, AckNoCallback,\
        \ NackBadRequest, NackUnauthorized, ServerError."
      operationId: select
      tags:
      - Contracting / Ordering
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: select
                message:
                  $ref: '#/components/schemas/SelectAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '403':
          $ref: '#/components/responses/NackDiscretionary'
        '202':
          $ref: '#/components/responses/AckNoCallback'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /on_select:
    post:
      summary: PN returns a priced quote
      description: "The PN calls this endpoint on the CN, delivering a priced quote\
        \ computed from the resources and offers submitted in the preceding /select\
        \ request.\n\nAdditional preconditions: A /select request MUST have been sent\
        \ by the CN and accepted (200 Ack) by the PN before this callback is triggered.\n\
        \nThe message MUST contain an OnSelectAction with a Contract object updated\
        \ to include offer-level considerations and a total priced quote. The CN uses\
        \ this quote to decide whether to proceed to /init.\n\nCallback relationship:\
        \ This endpoint is triggered by the PN after evaluating the selection and\
        \ computing a priced quote. The CN MUST use the messageId in Context to correlate\
        \ this callback with the originating /select call and SHOULD present the returned\
        \ quote to the consumer before proceeding.\n\nResponse codes: Ack, NackBadRequest,\
        \ NackUnauthorized, ServerError."
      operationId: onSelect
      tags:
      - Contracting / Ordering
      parameters:
      - $ref: '#/components/parameters/CallbackAuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: on_select
                message:
                  $ref: '#/components/schemas/OnSelectAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /init:
    post:
      summary: CN initiates final contract — submits billing, fulfillment and payment intent
      description: "The CN sends billing, fulfillment, and payment intent details\
        \ to the PN so that the PN can generate a final draft contract including\
        \ personalized payment terms.\n\nAdditional preconditions: A /select request\
        \ MUST have completed and the CN MUST have received an /on_select callback\
        \ with a priced quote before this endpoint may be called.\n\nThe message MUST\
        \ contain an InitAction with a Contract object that includes participant billing\
        \ details, performance (fulfillment) preferences, and initial payment intent.\
        \ The PN uses this information to finalize payment terms.\n\nCallback relationship:\
        \ After generating the final draft contract with payment terms, the PN MUST\
        \ send an /on_init callback to the CN. The PN MUST NOT request payment before\
        \ the /on_init stage. The CN MUST correlate the callback using the messageId\
        \ from Context.\n\nResponse codes: Ack, AckNoCallback, NackBadRequest, NackUnauthorized,\
        \ ServerError."
      operationId: init
      tags:
      - Contracting / Ordering
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: init
                message:
                  $ref: '#/components/schemas/InitAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '403':
          $ref: '#/components/responses/NackDiscretionary'
        '202':
          $ref: '#/components/responses/AckNoCallback'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /on_init:
    post:
      summary: PN returns final draft contract with payment terms
      description: "The PN calls this endpoint on the CN, delivering the final draft\
        \ contract that includes personalized payment terms, billing confirmation,\
        \ and any settlement conditions.\n\nAdditional preconditions: A /init request\
        \ MUST have been sent by the CN and accepted (200 Ack) by the PN before\
        \ this callback is triggered. The PN MUST NOT request or collect payment\
        \ before this stage.\n\nThe message MUST contain an OnInitAction with a Contract\
        \ object that reflects the finalized draft state including payment terms, billing\
        \ confirmation, and settlement placeholders. The CN reviews these terms before\
        \ proceeding to /confirm.\n\nCallback relationship: This endpoint is triggered\
        \ by the PN after generating the final draft contract in response to /init.\
        \ The CN MUST use the messageId in Context to correlate this callback and\
        \ SHOULD present the payment terms to the consumer for acceptance before calling\
        \ /confirm.\n\nResponse codes: Ack, NackBadRequest, NackUnauthorized, ServerError."
      operationId: onInit
      tags:
      - Contracting / Ordering
      parameters:
      - $ref: '#/components/parameters/CallbackAuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: on_init
                message:
                  $ref: '#/components/schemas/OnInitAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /confirm:
    post:
      summary: CN confirms the contract
      description: "The CN signals unconditional acceptance of all negotiated terms\
        \ and provides payment proof or a payment reference to the PN, requesting\
        \ that the PN convert the draft contract into a binding commitment.\n\nAdditional\
        \ preconditions: An /on_init callback MUST have been received by the CN carrying\
        \ the final draft contract with payment terms. The consumer MUST have accepted\
        \ those terms before this endpoint may be called.\n\nThe message MUST contain\
        \ a ConfirmAction with the full Contract object including payment proof or\
        \ reference in the settlements array. The PN uses this evidence to verify\
        \ payment and activate the contract.\n\nCallback relationship: After verifying\
        \ payment and activating the contract, the PN MUST send an /on_confirm callback\
        \ to the CN carrying the confirmed Contract with its assigned ID and initial\
        \ fulfillment state. The CN MUST correlate the callback using the messageId\
        \ from Context.\n\nResponse codes: Ack, AckNoCallback, NackBadRequest, NackUnauthorized,\
        \ ServerError."
      operationId: confirm
      tags:
      - Contracting / Ordering
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: confirm
                message:
                  $ref: '#/components/schemas/ConfirmAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '403':
          $ref: '#/components/responses/NackDiscretionary'
        '202':
          $ref: '#/components/responses/AckNoCallback'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /on_confirm:
    post:
      summary: PN returns the confirmed contract
      description: "The PN calls this endpoint on the CN, delivering the confirmed\
        \ contract with its PN-assigned identifier and the initial performance state\
        \ after verifying payment and activating the commitment.\n\nAdditional preconditions:\
        \ A /confirm request MUST have been sent by the CN and accepted (200 Ack)\
        \ by the PN. The PN MUST have verified payment proof before triggering this\
        \ callback.\n\nThe message MUST contain an OnConfirmAction with the Contract\
        \ object whose status is set to ACTIVE, whose id field carries the PN-assigned\
        \ contract identifier, and whose performance array reflects the initial fulfillment\
        \ state.\n\nCallback relationship: This endpoint is triggered by the PN after\
        \ verifying payment and activating the contract in response to /confirm. The\
        \ CN MUST use the messageId in Context to correlate this callback and MUST\
        \ store the contract id for subsequent status, track, update, cancel, rate,\
        \ and support interactions.\n\nResponse codes: Ack, NackBadRequest, NackUnauthorized,\
        \ ServerError."
      operationId: onConfirm
      tags:
      - Contracting / Ordering
      parameters:
      - $ref: '#/components/parameters/CallbackAuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: on_confirm
                message:
                  $ref: '#/components/schemas/OnConfirmAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /status:
    post:
      summary: CN requests the current state of an contract
      description: "The CN requests the current state of an active contract from\
        \ the PN by providing the contract identifier received in the /on_confirm\
        \ callback.\n\nAdditional preconditions: A /confirm request MUST have completed\
        \ and the CN MUST have received an /on_confirm callback with a confirmed Contract\
        \ carrying a valid id before this endpoint may be called. CNs SHOULD NOT\
        \ long-poll using repeated /status calls; the PN MAY push significant state\
        \ changes proactively via /on_status.\n\nThe message MUST contain a StatusAction\
        \ with a Contract object whose id field identifies the contract being queried.\n\
        \nCallback relationship: After retrieving the contract state, the PN MUST\
        \ send an /on_status callback carrying the full Contract object with the current\
        \ performance and status fields. The PN MAY also send /on_status callbacks\
        \ proactively for significant state changes without a prior /status request.\
        \ The CN MUST correlate solicited callbacks using the messageId from Context.\n\
        \nResponse codes: Ack, AckNoCallback, NackBadRequest, NackUnauthorized, ServerError."
      operationId: status
      tags:
      - Fulfillment
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: status
                message:
                  $ref: '#/components/schemas/StatusAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '403':
          $ref: '#/components/responses/NackDiscretionary'
        '202':
          $ref: '#/components/responses/AckNoCallback'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /on_status:
    post:
      summary: PN returns the current state of the contract
      description: "The PN calls this endpoint on the CN, delivering the current\
        \ state of an active contract including performance and fulfillment updates.\
        \ This endpoint covers significant state changes; it is not intended for real-time\
        \ position or progress tracking, for which the CN MUST use /track and /on_track.\n\
        \nAdditional preconditions: Either a /status request MUST have been accepted\
        \ (200 Ack) by the PN, or the PN is sending a proactive push for a significant\
        \ state change on an already-confirmed contract. The PN MAY send proactive\
        \ /on_status callbacks without a preceding /status request for significant\
        \ contract state transitions.\n\nThe message MUST contain an OnStatusAction\
        \ with the full Contract object reflecting the current status and performance\
        \ state.\n\nCallback relationship: This endpoint is triggered by the PN either\
        \ in response to a /status request or proactively when a significant contract\
        \ state change occurs. The CN MUST use the messageId in Context to correlate\
        \ solicited callbacks and MUST handle unsolicited callbacks by updating the\
        \ locally held contract state.\n\nResponse codes: Ack, NackBadRequest, NackUnauthorized,\
        \ ServerError."
      operationId: onStatus
      tags:
      - Fulfillment
      parameters:
      - $ref: '#/components/parameters/CallbackAuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: on_status
                message:
                  $ref: '#/components/schemas/OnStatusAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /track:
    post:
      summary: CN requests a real-time tracking handle for an active contract
      description: "The CN requests a real-time tracking handle from the PN for\
        \ an active fulfillment or performance stage of a confirmed contract. This\
        \ endpoint provides a URL or WebSocket endpoint for continuous position and\
        \ progress updates; it is not intended for contract state change notifications,\
        \ for which the CN MUST use /status and /on_status.\n\nAdditional preconditions:\
        \ A /confirm request MUST have completed and the CN MUST have received an\
        \ /on_confirm callback with a confirmed Contract before this endpoint may be\
        \ called.\n\nThe message MUST contain a TrackAction with a Tracking object\
        \ whose contract.id identifies the contract whose performance stage is to be\
        \ tracked.\n\nCallback relationship: After preparing the tracking handle, the\
        \ PN MUST send an /on_track callback to the CN carrying a Tracking object\
        \ with the URL or WebSocket endpoint. The CN MUST correlate the callback\
        \ using the messageId from Context and MAY open the tracking connection immediately\
        \ upon receipt.\n\nResponse codes: Ack, AckNoCallback, NackBadRequest, NackUnauthorized,\
        \ ServerError."
      operationId: track
      tags:
      - Fulfillment
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: track
                message:
                  $ref: '#/components/schemas/TrackAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '403':
          $ref: '#/components/responses/NackDiscretionary'
        '202':
          $ref: '#/components/responses/AckNoCallback'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /on_track:
    post:
      summary: PN returns real-time tracking handle and status
      description: "The PN calls this endpoint on the CN, delivering a Tracking\
        \ handle containing the URL or WebSocket endpoint through which the CN may\
        \ subscribe to real-time fulfillment position and progress updates.\n\nAdditional\
        \ preconditions: A /track request MUST have been sent by the CN and accepted\
        \ (200 Ack) by the PN before this callback is triggered.\n\nThe message MUST\
        \ contain an OnTrackAction with a Tracking object that includes a url for the\
        \ real-time data stream and a status field indicating whether tracking is ACTIVE\
        \ or INACTIVE.\n\nCallback relationship: This endpoint is triggered by the\
        \ PN in response to a /track request. The CN MUST use the messageId in Context\
        \ to correlate this callback with the originating /track call and SHOULD connect\
        \ to the provided tracking URL or WebSocket endpoint to receive real-time updates.\n\
        \nResponse codes: Ack, NackBadRequest, NackUnauthorized, ServerError."
      operationId: onTrack
      tags:
      - Fulfillment
      parameters:
      - $ref: '#/components/parameters/CallbackAuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: on_track
                message:
                  $ref: '#/components/schemas/OnTrackAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /update:
    post:
      summary: CN requests a mutation to an active contract
      description: "The CN requests the PN to mutate an active contract, which may\
        \ involve changes to committed resources, quantities, billing details, performance\
        \ preferences, or payment arrangements.\n\nAdditional preconditions: A /confirm\
        \ request MUST have completed and the CN MUST hold a confirmed Contract with\
        \ a valid id before this endpoint may be called.\n\nThe message MUST contain\
        \ an UpdateAction with the Contract object reflecting the desired mutation.\
        \ When context.try is set to true, the CN is requesting a preview of the\
        \ updated terms without committing state; the PN MUST respond via /on_update\
        \ with recalculated terms but MUST NOT change any persistent state. When context.try\
        \ is false (the default), the CN MUST include context.requestDigest containing\
        \ the digest of the on_update preview response it received; if context.requestDigest\
        \ is absent or does not match, the PN MUST return a NackBadRequest. The PN\
        \ MUST apply the change and respond with the confirmed updated contract.\n\nCallback relationship:\
        \ After processing the update request, the PN MUST send an /on_update callback\
        \ to the CN. When context.try was true, the callback carries updated terms\
        \ without state change. When context.try was false, the callback carries the\
        \ confirmed updated contract. The PN MAY also send unsolicited /on_update\
        \ callbacks for PN-initiated contract mutations. The CN MUST correlate\
        \ solicited callbacks using the messageId from Context.\n\nResponse codes:\
        \ Ack, AckNoCallback, NackBadRequest, NackUnauthorized, ServerError."
      operationId: update
      tags:
      - Fulfillment
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: update
                message:
                  $ref: '#/components/schemas/UpdateAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '403':
          $ref: '#/components/responses/NackDiscretionary'
        '202':
          $ref: '#/components/responses/AckNoCallback'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /on_update:
    post:
      summary: PN returns the updated contract
      description: "The PN calls this endpoint on the CN, delivering the updated\
        \ contract state. When responding to a preview request (context.try was true),\
        \ the PN returns recalculated terms without having changed any state. When\
        \ responding to a committed update (context.try was false) or sending a proactive\
        \ PN-initiated mutation, the PN returns the confirmed updated contract.\n\
        \nAdditional preconditions: Either an /update request MUST have been sent by\
        \ the CN and accepted (200 Ack) by the PN, or the PN is sending a proactive\
        \ update for a PN-initiated contract mutation on an already-confirmed\
        \ contract.\n\nThe message MUST contain an OnUpdateAction with the Contract\
        \ object. The context.try field echoes the value from the originating /update\
        \ request to allow the CN to interpret whether this is a preview or a committed\
        \ change.\n\nCallback relationship: This endpoint is triggered by the PN either\
        \ in response to an /update request or proactively for PN-initiated mutations.\
        \ The CN MUST use the messageId in Context to correlate solicited callbacks\
        \ and MUST handle unsolicited callbacks by updating the locally held contract\
        \ state.\n\nResponse codes: Ack, NackBadRequest, NackUnauthorized, ServerError."
      operationId: onUpdate
      tags:
      - Fulfillment
      parameters:
      - $ref: '#/components/parameters/CallbackAuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: on_update
                message:
                  $ref: '#/components/schemas/OnUpdateAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /cancel:
    post:
      summary: CN requests cancellation of an contract
      description: "The CN requests full or partial cancellation of an active contract\
        \ from the PN, using the context.try two-phase pattern to either preview\
        \ cancellation terms or commit the cancellation.\n\nAdditional preconditions:\
        \ A /confirm request MUST have completed and the CN MUST hold a confirmed\
        \ Contract with a valid id before this endpoint may be called.\n\nThe message\
        \ MUST contain a CancelAction with the Contract object whose id identifies\
        \ the contract to be cancelled. When context.try is set to true, the CN is\
        \ requesting applicable cancellation terms (such as refund policy and penalties)\
        \ without committing to cancellation; the PN MUST respond via /on_cancel\
        \ with the applicable policy without changing state. When context.try is false\
        \ (the default), the CN MUST include context.requestDigest containing the\
        \ digest of the on_cancel preview response it received; if context.requestDigest\
        \ is absent or does not match, the PN MUST return a NackBadRequest. The PN\
        \ MUST cancel the contract and respond with the cancelled contract.\n\nCallback relationship:\
        \ After processing the cancellation request, the PN MUST send an /on_cancel\
        \ callback to the CN. When context.try was true, the callback carries the\
        \ applicable cancellation policy without state change. When context.try was\
        \ false, the callback carries the cancelled contract with updated settlement\
        \ information. The CN MUST correlate the callback using the messageId from\
        \ Context.\n\nResponse codes: Ack, AckNoCallback, NackBadRequest, NackUnauthorized,\
        \ ServerError."
      operationId: cancel
      tags:
      - Fulfillment
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: cancel
                message:
                  $ref: '#/components/schemas/CancelAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '403':
          $ref: '#/components/responses/NackDiscretionary'
        '202':
          $ref: '#/components/responses/AckNoCallback'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /on_cancel:
    post:
      summary: PN returns cancellation terms or confirms cancellation
      description: "The PN calls this endpoint on the CN, delivering either the\
        \ applicable cancellation policy (when responding to a preview request) or\
        \ the confirmed cancelled contract (when responding to a committed cancellation).\n\
        \nAdditional preconditions: A /cancel request MUST have been sent by the CN\
        \ and accepted (200 Ack) by the PN before this callback is triggered.\n\n\
        The message MUST contain an OnCancelAction with the Contract object. When context.try\
        \ was true in the originating /cancel request, the Contract carries cancellation\
        \ policy, fees, and refund timeline without state change. When context.try\
        \ was false, the Contract carries status CANCELLED and updated settlement information\
        \ reflecting any refunds or penalties.\n\nCallback relationship: This endpoint\
        \ is triggered by the PN in response to a /cancel request. The CN MUST use\
        \ the messageId in Context to correlate this callback. When this is a preview\
        \ response, the CN SHOULD present the cancellation terms to the consumer before\
        \ calling /cancel with context.try set to false.\n\nResponse codes: Ack, NackBadRequest,\
        \ NackUnauthorized, ServerError."
      operationId: onCancel
      tags:
      - Fulfillment
      parameters:
      - $ref: '#/components/parameters/CallbackAuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: on_cancel
                message:
                  $ref: '#/components/schemas/OnCancelAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /rate:
    post:
      summary: CN submits ratings for one or more entities
      description: "The CN submits one or more rating inputs to the PN for ratable\
        \ entities associated with a completed contract, including the contract itself,\
        \ performance stages, individual resources, the provider, agents, and support\
        \ interactions.\n\nAdditional preconditions: The contract for which ratings\
        \ are being submitted MUST have reached a terminal state (COMPLETE or CANCELLED)\
        \ and the CN MUST hold the confirmed Contract id.\n\nThe message MUST contain\
        \ a RateAction with a ratingInputs array. Each RatingInput MUST identify the\
        \ target entity being rated. The PN MUST record the submitted ratings.\n\n\
        Callback relationship: After processing the rating, the PN MUST send an /on_rate\
        \ callback to the CN confirming the ratings were recorded and optionally returning\
        \ an aggregate rating snapshot. The CN MUST correlate the callback using the\
        \ messageId from Context.\n\nResponse codes: Ack, AckNoCallback, NackBadRequest,\
        \ NackUnauthorized, ServerError."
      operationId: rate
      tags:
      - Post-Fulfillment
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: rate
                message:
                  $ref: '#/components/schemas/RateAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '403':
          $ref: '#/components/responses/NackDiscretionary'
        '202':
          $ref: '#/components/responses/AckNoCallback'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /on_rate:
    post:
      summary: PN acknowledges rating and optionally returns aggregate
      description: "The PN calls this endpoint on the CN, confirming that the submitted\
        \ ratings have been recorded and optionally returning aggregate rating data.\n\
        \nAdditional preconditions: A /rate request MUST have been sent by the CN\
        \ and accepted (200 Ack) by the PN before this callback is triggered.\n\n\
        The message MUST contain an OnRateAction with a ratings array carrying confirmation\
        \ of the recorded ratings and MAY include aggregate rating snapshots for the\
        \ rated entities.\n\nCallback relationship: This endpoint is triggered by the\
        \ PN in response to a /rate request. The CN MUST use the messageId in Context\
        \ to correlate this callback with the originating /rate call.\n\nResponse codes:\
        \ Ack, NackBadRequest, NackUnauthorized, ServerError."
      operationId: onRate
      tags:
      - Post-Fulfillment
      parameters:
      - $ref: '#/components/parameters/CallbackAuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: on_rate
                message:
                  $ref: '#/components/schemas/OnRateAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /support:
    post:
      summary: CN requests support information for an entity
      description: "The CN requests support from the PN for any entity associated\
        \ with a contract by submitting a support request that the PN uses to create\
        \ or link a support ticket.\n\nAdditional preconditions: The CN MUST hold\
        \ a confirmed Contract id or a reference to another supported entity before\
        \ this endpoint may be called.\n\nThe message MUST contain a SupportAction\
        \ with a Support object that describes the nature of support needed and the\
        \ reference to the entity requiring support. The Support object is not limited\
        \ to contracts and MAY reference resources, providers, or agents. The PN MUST\
        \ create or link a support ticket and return the details.\n\nCallback relationship:\
        \ After processing the support request, the PN MUST send an /on_support callback\
        \ to the CN returning support contact details and the created or linked ticket\
        \ information. The CN MUST correlate the callback using the messageId from\
        \ Context.\n\nResponse codes: Ack, AckNoCallback, NackBadRequest, NackUnauthorized,\
        \ ServerError."
      operationId: support
      tags:
      - Post-Fulfillment
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: support
                message:
                  $ref: '#/components/schemas/SupportAction'
      responses:
        '200':
          $ref: '#/components/responses/Ack'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '403':
          $ref: '#/components/responses/NackDiscretionary'
        '202':
          $ref: '#/components/responses/AckNoCallback'
        '429':
          $ref: '#/components/responses/NackTooManyRequests'
        '500':
