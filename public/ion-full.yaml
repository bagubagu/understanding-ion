                unit:
                  type: string
                  enum:
                  - GRAM
                  - KILOGRAM
                  - LITRE
                  - MILLILITRE
                  - PIECE
                  - DOZEN
                value:
                  type: number
          description: 'Minimum quantity for B2B wholesale. count for unit-based, measure for weight/volume-based products.

            '
          example:
            count: 10
          x-ion-conditional: true
          x-ion-condition: Required for B2B wholesale commerce pattern
        weightSlabs:
          type: array
