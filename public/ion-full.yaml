            - priceIDR
          example:
          - minKg: 0
            maxKg: 5
            priceIDR: 15000
          - minKg: 5
            maxKg: 10
            priceIDR: 25000
          x-ion-conditional: true
          x-ion-condition: Required for catalogued domestic logistics patterns
        offerType:
          type: string
          enum:
