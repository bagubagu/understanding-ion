    CashOnDelivery:
      type: object
      title: Cash On Delivery
      description: 'Runtime COD collection state. Offer-level COD policy fields (OTP required, denominations accepted, buyer
        daily limit, hold period, reconciliation variance) are declared per-offer in schema/extensions/logistics/offer/v1
        — they govern how COD is accepted, not the per-transaction collection record.

        '
      additionalProperties: false
      properties:
        collectionAmount:
          type: number
          description: Expected cash amount to collect from consumer
        collectionAmountCollected:
          type: number
          description: Actual cash amount the carrier collected
