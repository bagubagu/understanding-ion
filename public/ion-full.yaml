                type: string
              description:
                type: string
              quantity:
                type: number
              unitWeight:
                type: number
              hsCode:
                type: string
        packagingType:
          type: string
          enum:
          - CARTON
          - PALLET
          - CRATE
          - DRUM
          - BULK
          - ROLL
          - OTHER
        vehicleDetails:
          type: object
          properties:
            category:
              type: string
              enum:
              - PASSENGER_CAR
              - LIGHT_TRUCK
              - HEAVY_TRUCK
              - MOTORCYCLE
              - TRAILER
              - BUS
              - SPECIAL
            make:
              type: string
            model:
              type: string
            year:
              type: integer
            lengthM:
              type: number
            widthM:
              type: number
            heightM:
              type: number
            weightKg:
              type: number
          x-ion-conditional: true
        vehicleRegistration:
          type: string
          description: Vehicle registration plate number
          x-ion-conditional: true
        skuCount:
          type: integer
          description: Number of distinct SKUs
          x-ion-conditional: true
        storageCategory:
          type: string
          enum:
          - AMBIENT
          - CHILLED
          - FROZEN
          - HIGH_VALUE
          - HAZMAT
          - OVERSIZED
          x-ion-conditional: true
        skuManifest:
          type: array
          description: Per-SKU details for warehouse inbound
          items:
            type: object
            properties:
              skuId:
                type: string
              description:
                type: string
              quantity:
                type: integer
              unitWeightKg:
                type: number
              unitVolumeCbm:
                type: number
              expiryDate:
                type: string
                format: date
        maxWeight:
          type: object
          description: Maximum shipment weight the BPP accepts. Published in catalog.
          properties:
            value:
              type: number
            unit:
              type: string
        maxDimensions:
          type: object
          description: Maximum shipment dimensions the BPP accepts. Published in catalog.
          properties:
            length:
              type: number
            width:
              type: number
            height:
              type: number
            unit:
              type: string
          x-ion-conditional: true
      required:
      - serviceType
      - quantity
      x-ion-closed-extensions: false
      allOf:
      - $ref: '#/components/schemas/Attributes'
    LogisticsTracking:
      type: object
      title: Logistics Tracking Attributes
      additionalProperties: true
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:LogisticsTracking
      x-beckn-attaches-to: Tracking.trackingAttributes
      properties:
        trackingType:
          type: string
          enum:
          - LIVE_GPS
          - AWB_URL
          - WEBHOOK
          - WEBSOCKET
          - POLLING_API
          description: 'Mode of tracking offered. LIVE_GPS for hyperlocal real-time position. AWB_URL for parcel tracking
            on carrier''s own website. WEBHOOK for event-driven push. WEBSOCKET for bidirectional streaming. POLLING_API for
            request/response status queries.

            '
        refreshIntervalSeconds:
          type: integer
          description: 'Recommended polling interval for LIVE_GPS and POLLING_API modes. Typical: 5-15 seconds for hyperlocal,
            60+ for parcel.

            '
          x-ion-conditional: true
        credentials:
          type: object
          description: Authentication for WEBSOCKET or authenticated webhook
          properties:
            type:
              type: string
              enum:
              - BEARER_TOKEN
              - API_KEY
              - SIGNED_URL_PARAM
            value:
              type: string
            validUntil:
              type: string
              format: date-time
          x-ion-conditional: true
        webhookEvents:
          type: array
          description: Events the BPP will push to webhook (if trackingType=WEBHOOK)
          items:
            type: string
            enum:
            - STATE_CHANGE
            - LOCATION_UPDATE
            - SLA_BREACH_IMMINENT
            - EXCEPTION
            - DELIVERY_COMPLETE
          x-ion-conditional: true
        currentLocation:
          type: object
          description: 'Last known location snapshot at time of /on_track response. Primarily for LIVE_GPS.

            '
          properties:
            latitude:
              type: number
            longitude:
              type: number
            timestamp:
              type: string
              format: date-time
            accuracyMeters:
              type: number
            heading:
              type: number
              description: Degrees from true north
            speedKmh:
              type: number
          x-ion-conditional: true
        etaMinutes:
          type: integer
          description: Current ETA to next waypoint or destination
          x-ion-conditional: true
        routePolyline:
          type: string
          description: Encoded polyline of planned route (Google-style encoding)
        agentDetails:
          type: object
          description: 'Agent details exposed based on offer.agentAssignmentModel and current performance state.

            '
          properties:
            name:
              type: string
            phone:
              type: string
              description: Masked proxy phone, never real number
            vehicleType:
              type: string
            vehiclePlate:
              type: string
            photoUrl:
              type: string
              format: uri
            languagesSpoken:
              type: array
              items:
                type: string
          x-ion-conditional: true
        trackingHandoffToCarrier:
          type: boolean
          description: 'True if tracking URL redirects to carrier''s own tracking page (common for parcel where AWB is carrier-native).

            '
        carrierTrackingUrlPattern:
          type: string
          description: 'URL template for AWB_URL tracking. E.g. "https://jne.co.id/tracking?awb={awbNumber}"

            '
      required:
      - trackingType
      x-ion-closed-extensions: false
      allOf:
      - $ref: '#/components/schemas/Attributes'
  responses:
    Ack:
      description: "The implementer has authenticated the request, accepted it for\
        \ processing, and MUST deliver the business outcome asynchronously via the\
        \ corresponding callback endpoint. The Signature response header carries the\
        \ implementer's authenticated receipt."
      headers:
        Signature:
          $ref: '#/components/headers/AckSignatureHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Ack'
    AckNoCallback:
      description: "The implementer has received and authenticated the request but\
        \ cannot produce a callback — for example, no matching catalog was found,\
        \ inventory is unavailable, or the provider is closed. The response body carries\
        \ an Error explaining why no callback will follow."
      headers:
        Signature:
          $ref: '#/components/headers/AckSignatureHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AckNoCallback'
    NackBadRequest:
      description: "The request body is structurally invalid, missing required fields,\
        \ or carries a value that fails semantic validation. The implementer MUST NOT\
        \ process the request further. The caller MUST correct the request before retrying."
      headers:
        Signature:
          $ref: '#/components/headers/AckSignatureHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NackBadRequest'
    NackUnauthorized:
      description: "The Beckn HTTP Signature on the request is absent, expired, or\
        \ fails verification against the sender's public key returned by the subnet\
        \ registry lookup. The implementer MUST NOT process the request further. The\
        \ caller MUST correct its signing credential or key registration before retrying."
      headers:
        Signature:
          $ref: '#/components/headers/AckSignatureHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NackUnauthorized'
    ServerError:
      description: "An unexpected internal failure prevented the implementer from\
        \ processing the request. The caller SHOULD treat this as a transient error\
        \ and MAY retry after a backoff interval. The response body MAY contain an\
        \ error object with additional diagnostic detail."
      headers:
        Signature:
          $ref: '#/components/headers/AckSignatureHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ServerError'
    NackDiscretionary:
      description: "The responding NP has declined engagement for policy-governed\
        \ reasons unrelated to a protocol error in the request (insufficient caller\
        \ trust, capacity limits, scheduled inactivity, or general refusal). The\
        \ caller MUST NOT expect an on_* callback. NFOs MAY restrict or prohibit\
        \ discretionary NACKs per CON-008-20."
      headers:
        Signature:
          $ref: '#/components/headers/AckSignatureHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NackDiscretionary'
    NackTooManyRequests:
      description: "Rate limit or policy-governed capacity limit exceeded. The caller\
        \ MUST apply back-off before retrying. Implementations SHOULD include a\
        \ Retry-After header indicating when the caller MAY retry."
      headers:
        Signature:
          $ref: '#/components/headers/AckSignatureHeader'
        Retry-After:
          description: "Number of seconds (integer) or HTTP-date after which the\
            \ caller MAY retry the request."
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NackTooManyRequests'
    NackForbidden:
      description: Caller is authenticated but does not have permission to access or modify this resource.
      headers:
        Signature:
          $ref: '#/components/headers/AckSignatureHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NackForbidden'
    NackNotFound:
      description: The requested resource does not exist.
      headers:
        Signature:
          $ref: '#/components/headers/AckSignatureHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NackNotFound'
    NackConflict:
      description: "The request conflicts with existing state. For example, a subscription\
        \ with the same criteria already exists for this subscriber. The caller MUST\
        \ resolve the conflict (e.g., update the existing resource) before retrying."
      headers:
        Signature:
          $ref: '#/components/headers/AckSignatureHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NackConflict'
