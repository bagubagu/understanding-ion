        currency:
          type: string
          const: IDR
        changeIssuedBy:
          type: string
          enum:
          - PROVIDER
          - COURIER
          description: Who provides change to consumer
        maxCodAmount:
          type: number
          description: Maximum COD value allowed per ION network policy
        partialCollectionReason:
          type: string
          enum:
          - CONSUMER_SHORT_ON_CASH
          - DENOMINATION_UNAVAILABLE
          - CONSUMER_NEGOTIATED
          - CONSUMER_DISPUTED_AMOUNT
          - OTHER
          x-ion-conditional: true
          x-ion-condition: Required when collectionAmountCollected < collectionAmount
    CreditTerms:
      type: object
      title: Credit Terms
      description: 'Credit-based payment terms (business-procurement pattern, FWA-governed logistics, any deferred-payment
        scenario). Populated on PaymentDeclaration when method=CREDIT_FACILITY or when an active FWA grants credit terms to
        this transaction. ION Central validates credit availability at /init.

        '
