        timing:
          type: string
          enum:
          - ON_ORDER
          - PRE_FULFILLMENT
          - ON_FULFILLMENT
          - POST_FULFILLMENT
          description: When payment is collected relative to fulfilment.
        status:
          type: string
          enum:
          - PENDING
          - PAID
          - FAILED
          - REFUNDED
          - PARTIALLY_REFUNDED
        amount:
          type: number
          description: Payment amount in IDR
