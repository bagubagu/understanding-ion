        paidAt:
          type: string
          format: date-time
          description: Timestamp of successful payment confirmation
          x-ion-conditional: true
          x-ion-condition: Required after payment is confirmed
        gatewayRef:
          type: string
          description: Payment gateway transaction reference ID
          x-ion-conditional: true
          x-ion-condition: Required when payment gateway is used
        methodDetail:
          oneOf:
          - $ref: '#/components/schemas/QRIS'
          - $ref: '#/components/schemas/VirtualAccount'
          - $ref: '#/components/schemas/EWallet'
          - $ref: '#/components/schemas/CashOnDelivery'
          - $ref: '#/components/schemas/BankTransfer'
          - $ref: '#/components/schemas/BISettlement'
          - $ref: '#/components/schemas/BNPL'
          - $ref: '#/components/schemas/CardPayment'
          x-ion-conditional: true
          x-ion-condition: Required when method requires instrument-specific fields
        paymentRail:
          type: string
          description: 'Specific rail used for this payment. Enables downstream routing and reconciliation regardless of higher-level
            method. Example: method=BANK_TRANSFER with paymentRail=BI_FAST.

            '
          enum:
          - QRIS
          - BI_FAST
          - RTGS
          - SKN
          - VIRTUAL_ACCOUNT
          - EWALLET_OVO
          - EWALLET_DANA
          - EWALLET_GOPAY
          - EWALLET_SHOPEEPAY
          - EWALLET_LINKAJA
          - EWALLET_ASTRAPAY
          - CARD_VISA
          - CARD_MASTERCARD
          - CARD_JCB
          - CARD_AMEX
          - CARD_UNIONPAY
          - BILYET_GIRO
          - DIRECT_DEBIT
          - SWIFT_TT
          - LETTER_OF_CREDIT
          - COD_CASH
          - COD_CARD_TAP
        paymentGatewayProvider:
          type: string
          description: 'Payment gateway aggregator used to route this payment. Declared per transaction. Implementations may
            use one or more of these aggregators or direct bank/ewallet APIs.

            '
          enum:
          - DOKU
          - XENDIT
          - MIDTRANS
          - FINPAY
          - FASPAY
          - ESPAY
          - IPAY88
          - FINNET
          - LINKQU
          - DIRECT
          - OTHER
        creditTerms:
          $ref: '#/components/schemas/CreditTerms'
          x-ion-condition: Required when method=CREDIT_FACILITY or credit terms apply (B2B, FWA)
        refund:
          $ref: '#/components/schemas/Refund'
          x-ion-condition: Required when status=REFUNDED or PARTIALLY_REFUNDED
        invoice:
          $ref: '#/components/schemas/InvoiceReference'
        processingFee:
          $ref: '#/components/schemas/ProcessingFee'
      required:
