          - QRIS
          - VIRTUAL_ACCOUNT
          - EWALLET
          - COD
          - BANK_TRANSFER
          - BI_FAST
          - RTGS
          - SKN
          - BNPL
          - CREDIT_CARD
          - DEBIT_CARD
          - DIRECT_DEBIT
          - CREDIT_FACILITY
          - ESCROW
        collectedBy:
          type: string
          enum:
          - BAP
          - BPP
          - LSP
