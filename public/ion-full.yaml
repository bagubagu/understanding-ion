  x-ion-policy-registry:
    description: 'ION Policy Terms Registry. Policy IRIs are the authoritative source of policy semantics across the network.
      Each offer declares IRIs; ION Central resolves to the terms document and enforces at every API boundary.

      '
    registryLocation: /policies
    registryIndex: /policies/registry.json
    categories:
    - RETURN
    - CANCELLATION
    - WARRANTY
    - DISPUTE
    - GRIEVANCE_SLA
    - PAYMENT_TERMS
    - PENALTY
    - EVIDENCE
    - INSURANCE
    - SLA
    - RE_ATTEMPT
    - WEIGHT_DISPUTE
    - LIABILITY
    - INCIDENT
    - RTS_HANDOFF
    - LOGISTICS_FWA
    currentRegistryVersion: 1.0.0
    versionUpgradeModel: SINGLE_VERSION_WITH_90D_NOTICE
    customAddendumAllowed: true
    customAddendumMaxChars: 1000
    resolverApi:
      getPolicy:
        method: GET
        path: /policies/{iri}
        description: Resolve a policy IRI to its full structured terms document
        iriEncoding: URL_ENCODED
      listPolicies:
        method: GET
        path: /policies
        description: List/filter the registry
        filters:
