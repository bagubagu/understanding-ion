openapi: 3.1.1
info:
  title: ION (Indonesia Open Network) — Network Extension Specification
  description: "ION — Indonesia Open Network. Single-file network extension specification.\n\nRELATIONSHIP TO BECKN:\nThis\
    \ file EXTENDS Beckn Protocol v2.0.0. It does NOT copy or embed Beckn.\nEvery reference to a Beckn type uses $ref: beckn.yaml#/...\
    \ pointing to the\nlocal copy at schema/core/v2/api/v2.0.0/beckn.yaml.\nWhen Beckn releases a new version, only beckn.yaml\
    \ needs updating.\n\nWHAT THIS FILE CONTAINS:\n- L2: ION network profile (x-ion-profile block) — signing rules, regulatory\n\
    \  requirements, payment rails, conformance matrix for Indonesia\n- L3: ION protocol endpoint extensions — /raise family\
    \ (6 endpoints) and\n  /reconcile + /on_reconcile (2 endpoints). These 8 endpoints extend the\n  30 core Beckn endpoints.\
    \ Beckn's 30 endpoints live in beckn.yaml only.\n- L4: ION core attribute packs — cross-sector extensions that mount on\n\
    \  Beckn's *Attributes slots (address, identity, payment, tax, participant,\n  product, localization, rating, support,\
    \ raise, reconcile)\n- L5: ION sector attribute packs — trade and logistics extensions that mount\n  on the same *Attributes\
    \ slots for sector-specific fields\n\nEXTENSION CONTRACT:\nEvery L4/L5 schema carries x-beckn-attaches-to naming the Beckn\
    \ *Attributes\nslot it mounts onto. Every schema allOf's with\nbeckn.yaml#/components/schemas/Attributes to inherit @context/@type\n\
    requirements. This is what makes ION a non-forking extension of Beckn.\n\nCROSS-SCHEMA CONDITIONAL RULES:\nFive rules\
    \ whose trigger field lives in a different schema bag than the\nrequired field are declared in x-ion-conditional-rules\
    \ below. Standard\nJSON Schema if/then/else cannot express cross-bag conditions. ONIX\n(the ION validator) enforces these\
    \ at network boundaries.\n\nVALIDATOR USAGE:\nRun beckn.yaml + ion.yaml together through any OpenAPI 3.1.1 validator.\n\
    Do not merge them — they are designed to be used as two separate files."
  version: 0.6.0-draft
  contact:
    name: ION Network
    url: https://schema.ion.id
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
